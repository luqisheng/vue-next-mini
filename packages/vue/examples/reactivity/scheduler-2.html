<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../../dist/vue.js"></script>
    <style>
      .test {
        color: red;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const { reactive, effect, queuePreFlushCb } = Vue
      const obj = reactive({
        count: 1
      })

      effect(
        () => {
          console.log('effect', obj.count)
        },
        {
          scheduler(fn) {
            queuePreFlushCb(() => console.log('effect', obj.count))
          }
        }
      )

      obj.count++
      obj.count++
      console.log('代码结束')
    </script>
  </body>
</html>
