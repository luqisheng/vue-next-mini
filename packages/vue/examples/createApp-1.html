<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../dist/vue.js"></script>
    <style>
      .test {
        color: red;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const { h, createApp } = Vue
      const APP = {
        template: `<div class="test">hello world <h1 v-if="isShow">{{msg}}</h1></div>`,
        data() {
          return {
            msg: '你好，世界！',
            isShow: false
          }
        },
        created() {
          setTimeout(()=>{
            this.isShow = true
          },3000)
        },
      }
      const app = createApp(APP)
      app.mount('#app')
    </script>
  </body>
</html>
