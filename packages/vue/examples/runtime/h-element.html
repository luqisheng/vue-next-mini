<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../../dist/vue.js"></script>
    <style>
      .test {
        color: red;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const { h,isSameVNodeType } = Vue
      const vnode = h('div', { class: 'test',key:'1' }, [
        'hello world',
        h('span','span'),
        h('p','p'),
      ])
      const vnode2 = h('div', { class: 'test',key:'1' }, [
        'hello world2',
        h('span','span2'),
        h('p','p2'),
      ])
      console.log(vnode,isSameVNodeType(vnode,vnode2))
    </script>
  </body>
</html>
