<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../../dist/vue.js"></script>
    <style>
      .test {
        color: red;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const { h, render } = Vue
      const vnode = h('ul', { class: 'test' }, [
        h('li', { key: '1' }, 'a'),
        h('li', { key: '2' }, 'b'),
        h('li', { key: '3' }, 'c'),
        h('li', { key: '4' }, 'd')
      ])
      render(vnode, document.querySelector('#app'))
      setTimeout(() => {
        const vnode2 = h('ul', { class: 'test' }, [
          h('li', { key: '2' }, 'b'),
          h('li', { key: '4' }, 'd'),
          h('li', { key: '1' }, 'a'),
          h('li', { key: '5' }, 'e'),
          h('li', { key: '6' }, 'f')
        ])
        render(vnode2, document.querySelector('#app'))
      }, 3000)
    </script>
  </body>
</html>
