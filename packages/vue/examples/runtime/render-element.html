<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../../dist/vue.js"></script>
    <style>
      .test {
        color: red;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const { h, render } = Vue
      const vnode = h(
        'div',
        {
          class: { test: true, blue: false, red: true },
          style: { color: 'red', backgroundColor: 'blue' }
        },
        [h('span', 'span'), h('p', 'p')]
      )
      render(vnode, document.querySelector('#app'))
      console.log(vnode)

      setTimeout(() => {
        const vnode = h(
          'div',
          {
            class: 'active',
            style: { fontSize: '20px', backgroundColor: '#ddd' }
          },
          [
            h('span', 'hi'),
            h(
              'b',
              {
                class: { test: true, blue: false, red: true },
                style: { color: 'red' }
              },
              'rocky'
            )
          ]
        )
        render(vnode, document.querySelector('#app'))
      }, 3000)
    </script>
  </body>
</html>
