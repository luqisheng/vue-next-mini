<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="../../dist/vue.js"></script>
    <style>
      .test {
        color: red;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const { h } = Vue
      const component = {
        render() {
          const vnode1 = h('div','这是一个component')
          return vnode1
        },
      }
      const vnode = h('div', { class: 'test' }, [
        'hello world',
        h('span','span'),
        h('p','p'),
        h(component)
      ])
      console.log(vnode)
    </script>
  </body>
</html>
